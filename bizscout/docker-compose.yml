version: '3.8'

services:
  api:
    build: .
    ports:
      - "8002:8002"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    restart: always

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./frontend:/app/frontend
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install -r requirements.txt && streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8002
    depends_on:
      - api
    restart: always
