name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies for Linting
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 app/ frontend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ frontend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push API Image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: aleehydar/bizscout-api:latest

    - name: Deploy to EC2
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/bizscout
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
          docker pull aleehydar/bizscout-api:latest
          docker-compose down
          docker-compose up -d
