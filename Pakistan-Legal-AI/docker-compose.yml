# ─────────────────────────────────────────────────────────────────────────────
# Pakistan Legal Intelligence — Docker Compose
#
# Usage: docker-compose up --build
# This starts the entire stack in one command.
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  legal-ai:
    build: .                     # Build using the Dockerfile in the current dir
    container_name: pakistan-legal-ai
    ports:
      - "8000:8000"              # Map host port 8000 → container port 8000
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
