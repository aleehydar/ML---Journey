<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicFlow — AI Clinical Assistant</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --radius: 12px;
            
            /* Badges */
            --badge-immediate: #ef4444;
            --badge-immediate-bg: #fef2f2;
            --badge-urgent: #f97316;
            --badge-urgent-bg: #fff7ed;
            --badge-nonurgent: #10b981;
            --badge-nonurgent-bg: #ecfdf5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: var(--primary);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Spinner Animation */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section */
        #results {
            display: none;
        }

        .result-group {
            margin-bottom: 16px;
        }

        .result-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .badge-immediate {
            background-color: var(--badge-immediate-bg);
            color: var(--badge-immediate);
            border: 1px solid #fecaca;
        }

        .badge-urgent {
            background-color: var(--badge-urgent-bg);
            color: var(--badge-urgent);
            border: 1px solid #fed7aa;
        }

        .badge-non-urgent {
            background-color: var(--badge-nonurgent-bg);
            color: var(--badge-nonurgent);
            border: 1px solid #a7f3d0;
        }

        .risk-tag {
            display: inline-block;
            background-color: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .soap-box {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
            color: #334155;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .time-meta {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        footer {
            text-align: center;
            padding: 24px 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 480px) {
            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ClinicFlow</h1>
            <p class="subtitle">For Pakistani Healthcare Workers | Educational Use Only</p>
        </header>

        <div class="card">
            <textarea id="symptomsInput" placeholder="Describe patient symptoms here (e.g., 45yo male presents with severe chest pain radiating to left arm, sweating heavily)..."></textarea>
            <button id="generateBtn" onclick="generateNotes()">
                <span id="btnText">Generate SOAP Note</span>
                <div id="btnSpinner" class="spinner"></div>
            </button>
        </div>

        <div id="results" class="card">
            <div class="result-group">
                <div class="result-label">Triage Priority</div>
                <div id="priorityBadge" class="badge"></div>
            </div>

            <div class="result-group" id="riskFlagsGroup">
                <div class="result-label">Risk Flags</div>
                <div id="riskTagsContainer"></div>
            </div>

            <div class="result-group">
                <div class="result-label">SOAP Note</div>
                <div id="soapOutput" class="soap-box"></div>
            </div>
            
            <div id="timeOutput" class="time-meta"></div>
        </div>
    </div>

    <footer>
        Disclaimer: Not a substitute for qualified medical professionals. AI-generated notes must be reviewed by a certified practitioner.
    </footer>

    <script>
        async function generateNotes() {
            const input = document.getElementById('symptomsInput').value.trim();
            if (!input) {
                alert("Please describe patient symptoms first.");
                return;
            }

            // UI Loading state
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultsDiv = document.getElementById('results');
            
            btn.disabled = true;
            btnText.textContent = "Processing...";
            btnSpinner.style.display = "block";
            resultsDiv.style.display = "none";

            try {
                const response = await fetch('/triage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ symptoms: input })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                
                // Populate Triage Priority
                const priorityBadge = document.getElementById('priorityBadge');
                priorityBadge.textContent = data.triage_priority;
                // Reset classes
                priorityBadge.className = 'badge';
                if (data.triage_priority === 'Immediate') {
                    priorityBadge.classList.add('badge-immediate');
                } else if (data.triage_priority === 'Urgent') {
                    priorityBadge.classList.add('badge-urgent');
                } else {
                    priorityBadge.classList.add('badge-non-urgent');
                }

                // Populate Risk Flags
                const riskGroup = document.getElementById('riskFlagsGroup');
                const riskTagsContainer = document.getElementById('riskTagsContainer');
                riskTagsContainer.innerHTML = '';
                
                if (data.risk_flags && data.risk_flags.length > 0) {
                    riskGroup.style.display = 'block';
                    data.risk_flags.forEach(flag => {
                        const span = document.createElement('span');
                        span.className = 'risk-tag';
                        span.textContent = flag;
                        riskTagsContainer.appendChild(span);
                    });
                } else {
                    riskGroup.style.display = 'none';
                }

                // Populate SOAP Note
                document.getElementById('soapOutput').textContent = data.soap_note;
                
                // Populate processing time
                document.getElementById('timeOutput').textContent = `Processed in ${data.processing_time_ms}ms`;

                // Show results
                resultsDiv.style.display = 'block';
                
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while generating the note. Please try again.");
            } finally {
                // Reset UI state
                btn.disabled = false;
                btnText.textContent = "Generate SOAP Note";
                btnSpinner.style.display = "none";
            }
        }
    </script>
</body>
</html>
