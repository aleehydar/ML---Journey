version: '3.8'

services:
  clinicflow:
    build: .
    image: aleehydar/clinicflow-api:latest
    container_name: clinicflow_api
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN}
    restart: unless-stopped
    # Note: the existing attrition API is assumed to be running independently on port 8000.
